databases:
  - name: ruhi-bot-db
    plan: free
    databaseName: ruhi_bot_db
    user: ruhi_bot_user

services:
  - type: web
    name: ruhi-ji-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OWNER_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ruhi-bot-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.11.0